services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: exp10-backend
    environment:
      - PORT=5000
      - JWT_SECRET=exp10_super_secret_key
      - FRONTEND_ORIGIN=http://localhost:8080
    ports:
      - "5000:5000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: exp10-frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
